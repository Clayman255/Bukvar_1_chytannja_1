<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Розділові знаки в кінці речення</title>
<style>
  body{
    font-family: Arial, sans-serif;
    background:#FFF6E5; 
    text-align:center;
    margin:0;
    padding:0 10px 30px;
  }
  h1{margin: 20px 0 10px;}
  
  .sub-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .sub{margin:0; color:#444; font-size:18px; font-weight: 500;}

  .audio-task-btn {
    font-size: 20px;
    background: #fff;
    border: 2px solid #8b93ff;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .audio-task-btn:hover { transform: scale(1.1); }

  #startWrap{
    max-width: 980px;
    margin: 0 auto;
  }
  #start{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    background:#fff;
    border:2px dashed #b9c0e6;
    border-radius:14px;
    padding:15px;
    min-height:86px;
    align-items:center;
    justify-content:center;
  }

  .table{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:14px;
    max-width:980px;
    margin:16px auto 14px;
  }
  .col{
    background:#fff;
    border:2px solid #d8d8e8;
    border-radius:14px;
    padding:10px;
    min-height:320px;
  }
  .col h2{
    font-size:45px;
    margin:10px 0;
    color: #333;
  }
  .dropzone{
    min-height:260px;
    border:2px dashed #c9c9dd;
    border-radius:12px;
    padding:10px;
    background:#fafaff;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .dropzone.over{
    background:#eef6ff;
    border-color:#7fb0ff;
  }

  .card{
    background:#eef2ff;
    border:2px dashed #8b93ff;
    border-radius:12px;
    padding:10px 15px;
    margin:8px 0;
    cursor:grab;
    display:flex;
    align-items:center;
    justify-content: center; 
    gap:20px; 
    user-select:none;
    width: 240px; 
    box-sizing: border-box;
  }
  .card:active{cursor:grabbing}
  
  .badge{
    width:75px; 
    height:45px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#ffffff;
    border:1px solid #d8dcff;
    font-size:22px;
    flex-shrink: 0;
    white-space: nowrap; 
    overflow: hidden;
  }

  .play-btn{
    padding:8px 15px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #999;
    cursor:pointer;
    background:#fff;
    flex-shrink: 0;
    line-height: 1;
  }
  .play-btn:hover{background:#f2f4ff}

  #controls{
    max-width:980px;
    margin:20px auto 0;
    display:flex;
    gap:15px;
    justify-content:center;
  }
  
  .main-btn{
    padding:10px 25px;
    font-size:18px;
    font-weight: bold;
    border-radius:12px;
    border:2px solid #8b93ff;
    cursor:pointer;
    background:#fff;
    transition: 0.3s;
  }
  .main-btn:hover { background: #8b93ff; color: #fff; }

  #message{
    max-width:980px;
    margin:14px auto 0;
    font-size:20px;
    font-weight:800;
    min-height:28px;
  }
  .good{color:#0a7a2f}
  .bad{color:#b00020}

  .correct{ border-style:solid; border-color:#1aa34a; background:#f2fff6; }
  .wrong{ border-style:solid; border-color:#d6002f; background:#fff2f5; }

  @media (max-width: 860px){
    .table{grid-template-columns: 1fr; }
    .col{min-height: 200px;}
    .card{width: 260px;}
  }
</style>
</head>

<body>

  <h1>Розділові знаки в кінці речення</h1>
  
  <div class="sub-wrapper">
    <p class="sub">Послухай речення. Перетягни їх у колонки з правильним розділовим знаком у кінці.</p>
    <button class="audio-task-btn" onclick="play('zav.mp3')" title="Прослухати завдання">🔊</button>
  </div>

  <div id="startWrap">
    <div id="start"></div>
  </div>

  <div class="table">
    <div class="col" data-type="question">
      <h2>?</h2>
      <div class="dropzone" id="bin-question"></div>
    </div>

    <div class="col" data-type="imperative">
      <h2>!</h2>
      <div class="dropzone" id="bin-imperative"></div>
    </div>

    <div class="col" data-type="declarative">
      <h2>.</h2>
      <div class="dropzone" id="bin-declarative"></div>
    </div>
  </div>

  <div id="controls">
    <button class="main-btn" id="checkBtn">Перевірити</button>
    <button class="main-btn" id="resetBtn">Ще раз</button>
  </div>

  <div id="message"></div>

<script>
  const data = [
    { id:"q1", type:"question",    src:"q1.mp3"  },
    { id:"q2", type:"question",    src:"q2.mp3"  },
    { id:"q3", type:"question",    src:"q3.mp3"  },
    { id:"i1", type:"imperative",  src:"imp1.mp3"},
    { id:"i2", type:"imperative",  src:"imp2.mp3"},
    { id:"i3", type:"imperative",  src:"imp3.mp3"},
    { id:"d1", type:"declarative", src:"dec1.mp3"},
    { id:"d2", type:"declarative", src:"dec2.mp3"},
    { id:"d3", type:"declarative", src:"dec3.mp3"}
  ];

  const iconMap = {
    q1: "🔥", q2: "🌱", q3: "⭐",
    d1: "🟦🟨", d2: "🌽", d3: "🍉",
    i1: "💙💛", i2: "🌻", i3: "🌾"
  };

  const start = document.getElementById("start");
  const message = document.getElementById("message");
  const checkBtn = document.getElementById("checkBtn");
  const resetBtn = document.getElementById("resetBtn");

  const audio = new Audio();
  function play(src){
    audio.src = src;
    audio.currentTime = 0;
    audio.play().catch(e => console.log("Помилка відтворення:", e));
  }

  function shuffle(arr){
    return [...arr].sort(() => Math.random() - 0.5);
  }

  function makeCard(item){
    const c = document.createElement("div");
    c.className="card";
    c.id=item.id;
    c.dataset.type=item.type;
    c.draggable=true;

    const badge = document.createElement("div");
    badge.className="badge";
    badge.textContent = iconMap[item.id] || "🔷";

    const btn = document.createElement("button");
    btn.className="play-btn";
    btn.type="button";
    btn.textContent="▶";
    btn.onclick = (e) => { e.stopPropagation(); play(item.src); };

    c.appendChild(badge);
    c.appendChild(btn);

    c.addEventListener("dragstart", (e)=> e.dataTransfer.setData("text/plain", c.id));
    return c;
  }

  function init(){
    // Очищення всіх зон перед початком
    start.innerHTML = "";
    document.querySelectorAll('.dropzone').forEach(zone => zone.innerHTML = "");
    message.textContent = "";
    message.className = "";
    
    // Перемішування та додавання карток у початкову зону
    shuffle(data).forEach(item => start.appendChild(makeCard(item)));
  }

  const zones = document.querySelectorAll(".dropzone, #start");
  zones.forEach(z=>{
    z.addEventListener("dragover", (e)=> e.preventDefault());
    z.addEventListener("drop", (e)=>{
      e.preventDefault();
      const id = e.dataTransfer.getData("text/plain");
      const card = document.getElementById(id);
      if(card) {
        // При переміщенні знімаємо підсвітку перевірки
        card.classList.remove("correct", "wrong");
        z.appendChild(card);
      }
    });
  });

  checkBtn.addEventListener("click", () => {
    let allCorrect = true;
    const mapping = {
      "bin-question": "question",
      "bin-imperative": "imperative",
      "bin-declarative": "declarative"
    };

    Object.entries(mapping).forEach(([binId, expected])=>{
      const bin = document.getElementById(binId);
      [...bin.querySelectorAll(".card")].forEach(card=>{
        if(card.dataset.type === expected){
          card.classList.add("correct");
          card.classList.remove("wrong");
        } else {
          card.classList.add("wrong");
          card.classList.remove("correct");
          // Повертаємо неправильні в старт
          start.appendChild(card);
          allCorrect = false;
        }
      });
    });

    if(start.querySelectorAll(".card").length > 0) allCorrect = false;

    if(allCorrect){
      message.className = "good";
      message.textContent = "✅ Завдання виконано правильно!";
    } else {
      message.className = "bad";
      message.textContent = "❌ Подумай ще раз! У тебе все вийде.";
    }
  });

  // Кнопка "Ще раз" тепер викликає повну ініціалізацію гри
  resetBtn.addEventListener("click", init);

  init();
</script>
<button id="btn-fs" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛶';}})()" title="На весь екран" style="position:fixed;top:12px;right:12px;z-index:9999;background:#2c3e50;color:white;border:none;width:44px;height:44px;border-radius:10px;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);">⛶</button>
</body>
</html>
