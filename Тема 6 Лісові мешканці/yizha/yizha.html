<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Хто що їсть?</title>
  <style>
    :root {
      --cream: #FFF4E6;
      --ok: #16a34a;
      --okBg: rgba(22, 163, 74, .15);
      --bad: #dc2626;
      --select: #3b82f6; 
      --shadow: 0 8px 20px rgba(0, 0, 0, .08);

      /* --- ЗБІЛЬШЕНІ РОЗМІРИ (+40%) --- */
      --adultSize: 168px; /* Було 120px */
      --foodSize: 98px;   /* Було 70px */
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 40px;
    }

    .wrap {
      width: 100%;
      max-width: 1100px; /* Трохи розширив контейнер, щоб вмістити більші фото */
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* КОНТЕЙНЕР ЗАГОЛОВКА */
    .title-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    h1.game-title {
      text-align: center;
      color: #4a4a4a;
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
    }

    /* КНОПКА ЗВУКУ */
    .audio-btn-main {
      background: #ff9f43;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 4px 0 #d35400;
      transition: transform 0.1s;
    }
    .audio-btn-main:active { transform: translateY(3px); box-shadow: none; }

    .header {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      align-items: center;
    }

    .btn {
      border: 0;
      background: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      font-weight: 700;
      color: #444;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .btn:active { transform: scale(0.95); }

    .msg-win {
      color: var(--ok);
      font-weight: 900;
      font-size: 1.4rem;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .msg-win.show { opacity: 1; }

    /* --- ЗОНА ЇЖІ (Зверху, липка) --- */
    .food-zone {
      position: sticky;
      top: 10px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 15px;
      margin-bottom: 30px;
      border: 2px solid rgba(255,255,255,0.8);
    }

    .food-pool {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      min-height: 110px; /* Збільшив висоту пулу під нові іконки */
    }

    /* --- СПИСОК ТВАРИН --- */
    .animals-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* РЯДОК З ТВАРИНОЮ */
    .row {
      display: flex;
      flex-wrap: wrap; 
      align-items: center;
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      position: relative;
      transition: background 0.3s;
    }

    .animal-container {
      flex: 0 0 auto;
      margin-right: 30px;
      position: relative;
    }

    .adult-img {
      width: var(--adultSize);
      height: var(--adultSize);
      object-fit: contain;
      display: block;
    }

    /* Стрілка-вказівник */
    .arrow-indicator {
      font-size: 2.5rem;
      color: #ccc;
      margin-right: 30px;
      font-weight: bold;
    }

    /* Контейнер для слотів їжі */
    .slots-container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .slot {
      width: calc(var(--foodSize) + 14px);
      height: calc(var(--foodSize) + 14px);
      border-radius: 16px;
      background: rgba(0,0,0,0.04);
      border: 3px dashed rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .slot.highlight {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--select);
      transform: scale(1.05);
    }

    /* ЇЖА */
    .food-item {
      width: var(--foodSize);
      height: var(--foodSize);
      object-fit: contain;
      cursor: grab;
      transition: transform 0.2s;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
      touch-action: none; 
    }
    .food-item.selected {
      transform: scale(1.2);
      z-index: 10;
      filter: drop-shadow(0 0 10px var(--select));
    }

    /* СТАН ГОТОВНОСТІ */
    .row.completed {
      background: var(--okBg);
      border: 3px solid var(--ok);
    }
    .row.completed .slot {
      border-style: solid;
      border-color: rgba(22, 163, 74, 0.3);
      background: rgba(255,255,255,0.6);
    }
    
    /* Зелена галочка */
    .check-mark {
      position: absolute;
      right: -10px;
      top: -10px;
      width: 50px;
      height: 50px;
      background: var(--ok);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transform: scale(0);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .row.completed .check-mark {
      transform: scale(1);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.3s ease-in-out; }

    @media (max-width: 700px) {
      .row { justify-content: center; text-align: center; gap: 15px; }
      .animal-container { margin-right: 0; margin-bottom: 10px; }
      .arrow-indicator { display: none; } 
      .slots-container { justify-content: center; }
      
      :root { --adultSize: 140px; --foodSize: 84px; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="title-wrapper">
      <h1 class="game-title">Хто що їсть?</h1>
      <button class="audio-btn-main" onclick="new Audio('zav.mp3').play()">🔊</button>
    </div>

    <div class="food-zone">
      <div class="food-pool" id="foodPool"></div>
    </div>

    <div class="animals-list" id="animalsList"></div>

    <div class="header" style="margin-top: 30px;">
      <button class="btn" id="resetBtn">🔄 Ще раз</button>
      <div class="msg-win" id="winMsg">🎉 Всі нагодовані! 🎉</div>
    </div>
  </div>

<script>
/**
 * КОНФІГУРАЦІЯ ГРИ
 */
const DATA = [
  {
    id: "animal1",
    img: "img1.png",
    foods: ["img1.1.png", "img4.1.png", "img4.2.png", "img5.1.png"]
  },
  {
    id: "animal2",
    img: "img2.png",
    foods: ["img2.1.png", "img1.1.png", "img5.1.png"]
  },
  {
    id: "animal3",
    img: "img3.png",
    foods: ["img3.1.png", "img1.1.png", "img5.1.png"]
  },
  {
    id: "animal4",
    img: "img4.png",
    foods: ["img4.1.png", "img4.2.png"]
  },
  {
    id: "animal5",
    img: "img5.png",
    foods: ["img5.1.png", "img1.1.png", "img2.1.png"]
  }
];

const els = {
  pool: document.getElementById('foodPool'),
  list: document.getElementById('animalsList'),
  resetBtn: document.getElementById('resetBtn'),
  winMsg: document.getElementById('winMsg')
};

let selectedFood = null;

// --- ІНІЦІАЛІЗАЦІЯ ---

function initGame() {
  els.pool.innerHTML = '';
  els.list.innerHTML = '';
  els.winMsg.classList.remove('show');
  selectedFood = null;

  let allFoods = [];
  
  DATA.forEach(animal => {
    createAnimalRow(animal);
    animal.foods.forEach(fSrc => {
      allFoods.push({ src: fSrc, ownerId: null });
    });
  });

  allFoods.sort(() => Math.random() - 0.5);
  allFoods.forEach(item => createFoodItem(item.src));
}

// --- СТВОРЕННЯ ЕЛЕМЕНТІВ ---

function createAnimalRow(animalData) {
  const row = document.createElement('div');
  row.className = 'row';
  row.dataset.id = animalData.id;
  row.dataset.needed = JSON.stringify(animalData.foods);
  row.dataset.eaten = JSON.stringify([]);

  const container = document.createElement('div');
  container.className = 'animal-container';
  const img = document.createElement('img');
  img.src = animalData.img;
  img.className = 'adult-img';
  
  const check = document.createElement('div');
  check.className = 'check-mark';
  check.innerHTML = '✔';
  
  container.appendChild(img);
  container.appendChild(check);

  const arrow = document.createElement('div');
  arrow.className = 'arrow-indicator';
  arrow.innerHTML = '⮕';

  const slotsDiv = document.createElement('div');
  slotsDiv.className = 'slots-container';

  animalData.foods.forEach(() => {
    const slot = document.createElement('div');
    slot.className = 'slot';
    
    slot.addEventListener('click', () => handleSlotClick(slot, row));
    slot.addEventListener('dragover', e => {
      e.preventDefault();
      slot.classList.add('highlight');
    });
    slot.addEventListener('dragleave', () => slot.classList.remove('highlight'));
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('highlight');
      const foodSrc = e.dataTransfer.getData('text');
      const uniqueId = e.dataTransfer.getData('uid');
      checkMatch(uniqueId, foodSrc, row, slot);
    });

    slotsDiv.appendChild(slot);
  });

  row.appendChild(container);
  row.appendChild(arrow);
  row.appendChild(slotsDiv);
  els.list.appendChild(row);
}

function createFoodItem(src) {
  const img = document.createElement('img');
  img.src = src;
  img.className = 'food-item';
  img.draggable = true;
  const uid = 'food_' + Math.random().toString(36).substr(2, 9);
  img.id = uid; 
  img.dataset.src = src;

  img.addEventListener('click', (e) => {
    e.stopPropagation();
    selectFood(img);
  });

  img.addEventListener('dragstart', e => {
    selectFood(img);
    e.dataTransfer.setData('text', src);
    e.dataTransfer.setData('uid', uid); 
  });

  els.pool.appendChild(img);
}

// --- ЛОГІКА ГРИ ---

function selectFood(imgNode) {
  if (imgNode.parentElement.classList.contains('slot')) return;
  
  document.querySelectorAll('.food-item.selected').forEach(b => b.classList.remove('selected'));
  imgNode.classList.add('selected');
  selectedFood = imgNode;
  
  document.querySelectorAll('.row:not(.completed) .slot:empty').forEach(s => {
    s.classList.add('highlight');
    setTimeout(() => s.classList.remove('highlight'), 400);
  });
}

function handleSlotClick(slot, row) {
  if (slot.children.length > 0) return;
  if (row.classList.contains('completed')) return;
  if (!selectedFood) return;

  const foodSrc = selectedFood.dataset.src;
  const uniqueId = selectedFood.id;
  
  checkMatch(uniqueId, foodSrc, row, slot);
}

function checkMatch(itemUid, foodSrc, row, slot) {
  const foodEl = document.getElementById(itemUid);
  if (!foodEl) return;
  
  const needed = JSON.parse(row.dataset.needed);
  let eaten = JSON.parse(row.dataset.eaten);

  const countNeeded = needed.filter(x => x === foodSrc).length;
  const countEaten = eaten.filter(x => x === foodSrc).length;

  if (countNeeded > countEaten) {
    slot.appendChild(foodEl);
    foodEl.classList.remove('selected');
    foodEl.draggable = false;
    selectedFood = null;

    eaten.push(foodSrc);
    row.dataset.eaten = JSON.stringify(eaten);

    if (eaten.length === needed.length) {
      row.classList.add('completed');
      checkGlobalWin();
    }

  } else {
    foodEl.classList.add('shake');
    if (navigator.vibrate) navigator.vibrate(200);
    setTimeout(() => foodEl.classList.remove('shake'), 400);
  }
}

function checkGlobalWin() {
  const totalRows = document.querySelectorAll('.row').length;
  const completedRows = document.querySelectorAll('.row.completed').length;
  
  if (totalRows === completedRows) {
    els.winMsg.classList.add('show');
    setTimeout(() => {
        els.resetBtn.scrollIntoView({ behavior: 'smooth' });
    }, 500);
  }
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.food-item') && !e.target.closest('.slot')) {
    if (selectedFood) {
        selectedFood.classList.remove('selected');
        selectedFood = null;
    }
  }
});

els.resetBtn.addEventListener('click', initGame);

initGame();
</script>
<button id="btn-fs" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛶';}})()" title="На весь екран" style="position:fixed;top:12px;right:12px;z-index:9999;background:#2c3e50;color:white;border:none;width:44px;height:44px;border-radius:10px;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);">⛶</button>
</body>
</html>
