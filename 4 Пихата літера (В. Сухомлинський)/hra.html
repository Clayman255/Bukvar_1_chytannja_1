<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Гра: Мудрий Чоловік</title>
  <style>
    :root {
      --bg: #fffbf0; /* кремовий фон */
      --card: #ffffff;
      --accent: #f39c12;
      --text: #000000; /* чорний шрифт */
      --good: #27ae60;
      --bad: #e74c3c;
      --violet: #8e44ad;
      --light-lilac: #eaddff; /* світло-бузковий */
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .game-container {
      max-width: 800px;
      width: 100%;
      background: var(--card);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      border: 4px solid #edc9af;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      color: var(--violet);
      margin-bottom: 5px;
    }

    h2 {
      text-align: center;
      font-size: 1.2rem;
      color: var(--violet);
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: normal;
    }

    .main-task {
      text-align: center;
      font-size: 1.3rem;
      color: #5d4037;
      margin-bottom: 25px;
      font-weight: bold;
      border-bottom: 2px dashed #edc9af;
      padding-bottom: 10px;
    }

    .scene {
      font-size: 1.6rem;
      line-height: 1.5;
      margin-bottom: 25px;
      padding: 20px;
      background: #fdf2e9;
      border-radius: 12px;
      border-left: 8px solid var(--accent);
      color: var(--text);
    }

    .options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .option-btn {
      background: white;
      border: 3px solid #dcdde1;
      padding: 20px;
      font-size: 1.4rem;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      font-weight: bold;
      color: var(--text);
    }

    .option-btn:hover {
      border-color: var(--accent);
      background: #fef9e7;
    }

    /* Оновлений стиль для кнопки ПЕРЕЗАПУСКУ */
    .restart-btn {
      background: var(--light-lilac) !important;
      color: black !important;
      border: 2px solid #d1bdfc !important;
      text-align: center !important;
      font-size: 1.6rem !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: block;
      width: 100%;
    }
    .restart-btn:hover {
      background: #d8c4fc !important;
      transform: scale(1.02);
    }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .check-box {
      width: 70px;
      height: 70px;
      border: 3px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      border-radius: 15px;
      background: #eee;
      transition: all 0.5s ease;
    }

    .check-box.revealed {
      background: #e8f5e9;
      border-color: var(--good);
      color: var(--good);
      transform: scale(1.1);
    }

    .feedback {
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      margin: 15px 0;
      height: 35px;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <h1>Пригоди Мудрого Чоловіка</h1>
    <h2>(за мотивами казки В. Сухомлинського "Пихата літера")</h2>
    <div class="main-task">
      Прочитай і поміркуй, що у цій ситуації зробить Мудрий Чоловік.
    </div>
    
    <div id="game-content">
      <div class="scene" id="scene-text">
        Мудрий Чоловік вирізав літери з березової кори. Що він планує зробити завтра?
      </div>

      <div class="options" id="options-container"></div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="progress-container" id="progress">
      <div class="check-box" id="step-0"></div>
      <div class="check-box" id="step-1"></div>
      <div class="check-box" id="step-2"></div>
    </div>
  </div>

  <script>
    const steps = [
      {
        text: "Мудрий Чоловік вирізав літери. Що він хоче зробити далі?",
        options: [
          { t: "Піти до людей і навчити їх читати.", correct: true },
          { t: "Сховати літери в лісі.", correct: false }
        ]
      },
      {
        text: "Він розкладає літери по черзі: А, Б, В... Раптом літера Я вискакує вперед! Що їй скаже Мудрий Чоловік?",
        options: [
          { t: "«Ти найважливіша, ставай першою!»", correct: false },
          { t: "«Сиди, будь ласка, й чекай своєї черги».", correct: true }
        ]
      },
      {
        text: "Літера Я не терпить, вона знову лізе в руки: «А мене чому забуваєш?». Яке рішення ухвалить Мудрий Чоловік?",
        options: [
          { t: "Поставить її на останнє місце.", correct: true },
          { t: "Викине її з козубця.", correct: false }
        ]
      }
    ];

    let currentStep = 0;
    const sceneEl = document.getElementById('scene-text');
    const optionsEl = document.getElementById('options-container');
    const feedbackEl = document.getElementById('feedback');

    function renderStep() {
      if (currentStep >= steps.length) {
        sceneEl.textContent = "Вітаємо! Ви допомогли Мудрому Чоловікові навести лад. Тепер абетка готова для людей!";
        optionsEl.innerHTML = '<button class="option-btn restart-btn" onclick="location.reload()">Почати спочатку 🔄</button>';
        feedbackEl.textContent = "";
        return;
      }

      const step = steps[currentStep];
      sceneEl.textContent = step.text;
      optionsEl.innerHTML = '';

      step.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.t;
        btn.onclick = () => {
          if (opt.correct) {
            feedbackEl.textContent = ""; // Прибрано текст "Правильно!"
            
            const checkBox = document.getElementById(`step-${currentStep}`);
            checkBox.textContent = "✓";
            checkBox.classList.add('revealed');
            
            currentStep++;
            const allBtns = optionsEl.querySelectorAll('button');
            allBtns.forEach(b => b.style.pointerEvents = 'none');
            
            setTimeout(renderStep, 1000); // Зменшено затримку для плавності без тексту
          } else {
            feedbackEl.textContent = "Спробуй ще раз! 🤔";
            feedbackEl.style.color = "var(--bad)";
            btn.style.borderColor = "var(--bad)";
            setTimeout(() => btn.style.borderColor = "#dcdde1", 500);
          }
        };
        optionsEl.appendChild(btn);
      });
    }

    renderStep();
  </script>
<button id="btn-fs" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛶';}})()" title="На весь екран" style="position:fixed;top:12px;right:12px;z-index:9999;background:#2c3e50;color:white;border:none;width:44px;height:44px;border-radius:10px;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);">⛶</button>
</body>
</html>
