<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Гра "Склади вислів"</title>
  <style>
    :root {
      --bg: #fbf6ee;
      --accent: #4da6ff;
      --bad: #ef4444;
      --success-bg: #e2fce2; /* Більш блідо-зелений */
      --success-text: #000000; 
      --item-text: #000000; /* Чисто чорний шрифт */
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header { text-align: center; margin-bottom: 20px; }
    h1 { color: #2980b9; margin-bottom: 10px; font-family: Arial, sans-serif; }

    .task-desc {
      font-size: 1.2rem;
      background: #fff;
      padding: 15px 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      max-width: 800px;
      margin-bottom: 20px;
    }

    .toolbar { margin-bottom: 20px; }
    
    button.tool-btn {
      border: 0; border-radius: 50%; width: 50px; height: 50px;
      font-size: 24px; background: var(--accent); cursor: pointer;
      color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .game-wrapper {
      position: relative;
      width: 100%;
      max-width: 1100px;
    }

    .game-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 150px; 
      position: relative;
      z-index: 6;
    }

    .column { display: flex; flex-direction: column; gap: 20px; }

    .item {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      font-size: 1.52rem;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      border: 3px solid transparent;
      transition: all 0.3s ease;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--item-text);
    }

    .item.selected { border-color: var(--accent); background-color: #eef8ff; }

    .matched-row {
      grid-column: 1 / span 2;
      background-color: var(--success-bg) !important;
      color: var(--success-text) !important;
      border: 3px solid #b7eeb7;
      border-radius: 15px;
      padding: 20px;
      font-size: 1.68rem;
      text-align: center;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      animation: appear 0.5s ease-out;
      margin-bottom: 10px;
    }

    @keyframes appear {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .item.error { animation: shake 0.4s; border-color: var(--bad); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .win-message {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: white;
      padding: 40px 60px; border-radius: 20px; font-size: 2.5rem;
      font-weight: bold; color: #16a34a; border: 6px solid #16a34a;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); z-index: 100; text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Склади вислів</h1>
  <div class="task-desc">З'єднай частини висловів. Прочитай утворені речення та поясни їх значення.</div>
</header>

<div class="toolbar">
  <button id="btnReset" class="tool-btn" onclick="location.reload()" title="Почати спочатку">🔄</button>
</div>

<div class="game-wrapper">
  <div class="game-container" id="game-grid">
    <div class="column" id="col-left"></div>
    <div class="column" id="col-right"></div>
  </div>
</div>

<div id="winMsg" class="win-message">Молодець! <br> Всі вислови зібрано!</div>

<script>
  const pairsData = [
    { left: 'Добре діло', right: 'твори сміло.', id: 1 },
    { left: 'Добро — не лихо,', right: 'ходить у світі тихо.', id: 2 },
    { left: 'Хто людям добра бажає,', right: 'той і собі має.', id: 3 },
    { left: 'Добре роби,', right: 'добре й буде.', id: 4 },
    { left: 'Все добре переймай,', right: 'а зла уникай.', id: 5 }
  ];

  let selectedLeft = null;
  let matchedCount = 0;

  const colLeft = document.getElementById('col-left');
  const colRight = document.getElementById('col-right');
  const gameGrid = document.getElementById('game-grid');

  function initGame() {
    colLeft.innerHTML = '';
    colRight.innerHTML = '';
    matchedCount = 0;

    const leftItems = [...pairsData].sort(() => Math.random() - 0.5);
    const rightItems = [...pairsData].sort(() => Math.random() - 0.5);

    leftItems.forEach((pair) => {
      const div = document.createElement('div');
      div.className = 'item';
      div.textContent = pair.left;
      div.dataset.id = pair.id;
      div.onclick = () => selectLeft(div);
      colLeft.appendChild(div);
    });

    rightItems.forEach(pair => {
      const div = document.createElement('div');
      div.className = 'item';
      div.textContent = pair.right;
      div.dataset.id = pair.id;
      div.onclick = () => selectRight(div);
      colRight.appendChild(div);
    });
  }

  function selectLeft(el) {
    if (el.classList.contains('matched')) return;
    document.querySelectorAll('#col-left .item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    selectedLeft = el;
  }

  function selectRight(el) {
    if (!selectedLeft) return;

    if (el.dataset.id === selectedLeft.dataset.id) {
      const id = el.dataset.id;
      const data = pairsData.find(p => p.id == id);
      
      const fullSentence = document.createElement('div');
      fullSentence.className = 'matched-row';
      fullSentence.textContent = `${data.left} ${data.right}`;
      
      selectedLeft.remove();
      el.remove();
      
      gameGrid.appendChild(fullSentence);

      selectedLeft = null;
      matchedCount++;

      if (matchedCount === pairsData.length) {
        const msg = document.getElementById('winMsg');
        setTimeout(() => { 
          msg.style.display = 'block'; 
          setTimeout(() => {
            msg.style.display = 'none';
          }, 5000);
        }, 600);
      }
    } else {
      el.classList.add('error');
      setTimeout(() => el.classList.remove('error'), 400);
    }
  }

  initGame();
</script>
</body>
</html>
