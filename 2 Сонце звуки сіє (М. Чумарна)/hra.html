<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Гра "Утворюємо словосполучення"</title>
  <style>
    :root {
      --bg: #fff9f0;
      --accent: #ff9f43;
      --bad: #ef4444;
      --text-main: #2c3e50;
      --success: #27ae60;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header { text-align: center; margin-bottom: 20px; z-index: 10; }
    h1 { color: #d35400; margin-bottom: 10px; font-size: 2.2rem; }

    .task-desc {
      font-size: 1.2rem;
      background: #fff;
      padding: 15px 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 600px;
      line-height: 1.4;
      border: 2px dashed var(--accent);
    }

    .toolbar { display: flex; gap: 15px; margin-bottom: 20px; z-index: 10; margin-top: 15px; }
    
    button.tool-btn {
      border: 0; border-radius: 50%; width: 50px; height: 50px;
      font-size: 24px; background: var(--accent); cursor: pointer;
      color: white; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 #e67e22; transition: all 0.1s;
    }
    button.tool-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #e67e22; }

    .game-wrapper {
      position: relative;
      width: 100%;
      max-width: 850px;
      margin-top: 20px;
    }

    #line-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .game-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 120px; 
      position: relative;
      z-index: 6;
    }

    .column { display: flex; flex-direction: column; gap: 15px; }

    .item {
      background: #fff;
      border-radius: 15px;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
      border: 3px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .item.selected { border-color: var(--accent); background-color: #fff4e6; transform: scale(1.05); }
    .item.error { animation: shake 0.4s; border-color: var(--bad); }
    .item.matched { cursor: default; filter: grayscale(0.5); opacity: 0.8; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .win-message {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: white;
      padding: 40px; border-radius: 30px; font-size: 2rem;
      font-weight: bold; color: var(--success); border: 8px solid var(--success);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); z-index: 100; text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Утворюємо словосполучення</h1>
  <div class="task-desc">
    Прочитай вірш М. Чумарної "Сонце звуки сіє". <br>
    <strong>З'єднай стрілками, хто що робить.</strong>
  </div>
</header>

<div class="toolbar">
  <button id="btnReset" class="tool-btn" title="Почати спочатку">🔄</button>
</div>

<div class="game-wrapper">
  <svg id="line-canvas">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="context-stroke" />
      </marker>
    </defs>
  </svg>

  <div class="game-container">
    <div class="column" id="col-left"></div>
    <div class="column" id="col-right"></div>
  </div>
</div>

<div id="winMsg" class="win-message">
  ☀️ Молодчинка! <br> 
  Ти чудово знаєш вірш! 🌈
</div>

<script>
  const pairsData = [
    { left: 'Сонце', right: 'сіє, розуміє', id: 1 },
    { left: 'Я', right: 'складаю', id: 2 },
    { left: 'Мова', right: 'твориться', id: 3 },
    { left: 'Річка', right: 'співає', id: 4 },
    { left: 'Гай', right: 'гомонить', id: 5 },
    { left: 'Дитина', right: 'виростає', id: 6 }
  ];

  const colors = ['#FF5252', '#FF9F43', '#FBC02D', '#4CAF50', '#2196F3', '#9C27B0'];
  
  let selectedLeft = null;
  let matchedCount = 0;

  const colLeft = document.getElementById('col-left');
  const colRight = document.getElementById('col-right');
  const canvas = document.getElementById('line-canvas');
  const winMsg = document.getElementById('winMsg');

  function initGame() {
    colLeft.innerHTML = '';
    colRight.innerHTML = '';
    canvas.innerHTML = canvas.querySelector('defs').outerHTML;
    matchedCount = 0;
    selectedLeft = null;
    winMsg.style.display = 'none';

    const leftItems = [...pairsData].sort(() => Math.random() - 0.5);
    const rightItems = [...pairsData].sort(() => Math.random() - 0.5);

    leftItems.forEach((pair) => {
      const div = document.createElement('div');
      div.className = 'item';
      div.textContent = pair.left;
      div.dataset.id = pair.id;
      div.dataset.color = colors[(pair.id - 1) % colors.length];
      div.onclick = () => selectLeft(div);
      colLeft.appendChild(div);
    });

    rightItems.forEach(pair => {
      const div = document.createElement('div');
      div.className = 'item';
      div.textContent = pair.right;
      div.dataset.id = pair.id;
      div.onclick = () => selectRight(div);
      colRight.appendChild(div);
    });
  }

  function selectLeft(el) {
    if (el.classList.contains('matched')) return;
    document.querySelectorAll('#col-left .item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    selectedLeft = el;
  }

  function selectRight(el) {
    if (el.classList.contains('matched') || !selectedLeft) return;

    if (el.dataset.id === selectedLeft.dataset.id) {
      const color = selectedLeft.dataset.color;
      el.classList.add('matched');
      selectedLeft.classList.add('matched');
      el.style.borderColor = color;
      selectedLeft.style.borderColor = color;
      el.style.backgroundColor = color + '15';
      drawArrow(selectedLeft, el, color);
      selectedLeft.classList.remove('selected');
      selectedLeft = null;
      matchedCount++;
      if (matchedCount === pairsData.length) {
        setTimeout(() => { winMsg.style.display = 'block'; }, 500);
      }
    } else {
      el.classList.add('error');
      setTimeout(() => el.classList.remove('error'), 400);
    }
  }

  function drawArrow(startEl, endEl, color) {
    const rect1 = startEl.getBoundingClientRect();
    const rect2 = endEl.getBoundingClientRect();
    const wrapperRect = document.querySelector('.game-wrapper').getBoundingClientRect();
    
    const x1 = rect1.right - wrapperRect.left;
    const y1 = rect1.top + rect1.height / 2 - wrapperRect.top;
    const x2 = rect2.left - wrapperRect.left;
    const y2 = rect2.top + rect2.height / 2 - wrapperRect.top;
    
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', color); line.setAttribute('stroke-width', '5');
    line.setAttribute('marker-end', 'url(#arrowhead)');
    canvas.appendChild(line);
  }

  window.addEventListener('resize', () => { if (matchedCount > 0) initGame(); });
  document.getElementById('btnReset').onclick = initGame;

  initGame();
</script>
</body>
</html>
